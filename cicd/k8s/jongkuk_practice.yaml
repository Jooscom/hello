apiVersion: apps/v1
kind: Deployment
metadata:
  name: jongkuk_practice_deployment
  labels:
    app: jongkuk_practice_hello
spec:
  replicas: 3
  selector:
    matchLabels:
      app: jongkuk_practice_hello
  template:
    metadata:
      labels:
        app: jongkuk_practice_hello
    spec:
      containers:
        - name: jongkuk_practice_hello
          image: scomjoo/hello:__BUILD_NUMBER__
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: jongkuk_practice_service
  labels:
    app: jongkuk_practice_hello
spec:
  type: NodePort
  selector:
    app: jongkuk_practice_hello
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 31331
